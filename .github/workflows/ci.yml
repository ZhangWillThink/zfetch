name: ci

on:
  push:
    branches: [main, master]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/**"
      - "scripts/**"
      - "presets/**"
      - "install.sh"
      - "CHANGELOG.md"
  pull_request:
    branches: [main, master]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/**"
      - "scripts/**"
      - "presets/**"
      - "install.sh"
      - "CHANGELOG.md"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - run: go vet ./...
      - run: go test ./...
      - run: GOOS=darwin GOARCH=arm64 go build ./...
      - run: GOOS=windows GOARCH=amd64 go build ./...
